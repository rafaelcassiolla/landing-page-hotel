<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserva Hotel</title>
    <link
      rel="shortcut icon"
      href="assets/images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="pt-cima">
          <img src="assets/images/logo.svg" alt="Logo Hotel" />

              <li>
                <a href="#">
                  <img src="assets/images/icon-bed.svg" alt="Bed image" />Your

                >
              </li>
              <li>
                <a href="#">
                  <img
                    src="assets/images/icon-house.svg"
                    alt="House image"

              </li>
              <li>
                <a href="#">

                >

              <li>
                <a href="#">
                  <img
                    src="assets/images/icon-breakfast-outline.svg"

                  />Breakfast</a
                >
              </li>
              <li>
                <a href="#">
                  <img
                    src="assets/images/icon-mail.svg"
                    alt="Mail image"

        </div>
        <div class="pt-baixo">

            <p>Today in cassis</p>

            <div id="sol"></div>
